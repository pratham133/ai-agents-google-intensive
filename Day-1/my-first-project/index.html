<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriorityFlow — Premium Task & Todo Dashboard</title>
    <meta name="description" content="Manage your tasks, track your progress, and stay organized with PriorityFlow. A gorgeous, clean, and highly productive task manager.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar / Dashboard -->
        <aside class="sidebar">
            <div class="card">
                <div class="header-brand">
                    <h1 class="logo" id="logo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                            <path d="m9 12 2 2 4-4"/>
                        </svg>
                        PriorityFlow
                    </h1>
                    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle Theme">
                        <!-- Sun Icon for switching to Light, Moon for switching to Dark (we will toggle it in JS) -->
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"/>
                            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Stats Card -->
            <div class="card stats-container">
                <h2 style="font-size: 1.1rem; font-weight: 600;">Dashboard</h2>
                
                <div class="progress-radial-wrapper">
                    <div class="progress-ring">
                        <svg>
                            <circle class="progress-ring__circle" stroke="var(--border-color)" stroke-width="8" fill="transparent" r="54" cx="70" cy="70"/>
                            <circle id="progressCircle" class="progress-ring__circle" stroke="var(--accent)" stroke-width="8" fill="transparent" r="54" cx="70" cy="70" stroke-linecap="round"/>
                        </svg>
                        <div class="progress-percentage">
                            <span id="progressText">0%</span>
                            <span>Done</span>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-val" id="statTotal">0</div>
                        <div class="stat-lbl">Total Tasks</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statCompleted">0</div>
                        <div class="stat-lbl">Completed</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statPending">0</div>
                        <div class="stat-lbl">Pending</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statOverdue" style="color: #ef4444;">0</div>
                        <div class="stat-lbl">Overdue</div>
                    </div>
                </div>
            </div>

            <!-- Categories Card -->
            <div class="card">
                <h2 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem;">Categories</h2>
                <div class="category-filters-list" id="categoryFiltersList">
                    <!-- Dynamic categories filters -->
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Search, Filters, and Sorting controls -->
            <div class="controls-bar">
                <div class="search-box">
                    <span class="search-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                        </svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Search tasks by title or details...">
                </div>
                
                <div class="filters-wrapper">
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Tasks</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                    </select>

                    <select id="sortOption" class="sort-select">
                        <option value="created-desc">Newest First</option>
                        <option value="created-asc">Oldest First</option>
                        <option value="due-date">Due Date</option>
                        <option value="priority">Priority</option>
                    </select>
                </div>
            </div>

            <!-- Add Task Form Card -->
            <div class="card input-form-card">
                <form id="todoForm" onsubmit="return false;">
                    <div class="form-group text-input-row">
                        <input type="text" id="taskTitle" placeholder="What needs to be done?" required autocomplete="off">
                        <button type="submit" class="btn-primary" id="addTaskBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Add Task
                        </button>
                    </div>

                    <div class="form-group" style="margin-top: 0.75rem;">
                        <input type="text" id="taskDesc" placeholder="Add details or description (optional)" autocomplete="off" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem 0.75rem; border-radius: var(--border-radius-sm); font-size: 0.9rem;">
                    </div>

                    <div class="form-options-grid">
                        <div class="option-select-wrapper">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority">
                                <option value="low">🟢 Low</option>
                                <option value="medium" selected>🟡 Medium</option>
                                <option value="high">🔴 High</option>
                            </select>
                        </div>

                        <div class="option-select-wrapper">
                            <label for="taskCategory">Category</label>
                            <select id="taskCategory">
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="shopping">Shopping</option>
                                <option value="health">Health</option>
                                <option value="other" selected>Other</option>
                            </select>
                        </div>

                        <div class="option-select-wrapper">
                            <label for="taskDueDate">Due Date</label>
                            <input type="date" id="taskDueDate">
                        </div>
                    </div>
                </form>
            </div>

            <!-- Tasks List -->
            <div class="task-list" id="taskList">
                <!-- Task items rendered dynamically -->
            </div>
        </main>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal-overlay" id="editModalOverlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Edit Task</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 0.25rem;">Title</label>
                    <input type="text" id="editTitle" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.75rem; border-radius: var(--border-radius-sm); font-size: 0.95rem;">
                </div>
                <div class="form-group">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 0.25rem;">Description</label>
                    <textarea id="editDesc" rows="3" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.75rem; border-radius: var(--border-radius-sm); font-size: 0.9rem; resize: vertical;"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div class="form-group">
                        <label style="font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 0.25rem;">Priority</label>
                        <select id="editPriority" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem; border-radius: var(--border-radius-sm);">
                            <option value="low">🟢 Low</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 0.25rem;">Category</label>
                        <select id="editCategory" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem; border-radius: var(--border-radius-sm);">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 0.25rem;">Due Date</label>
                    <input type="date" id="editDueDate" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem; border-radius: var(--border-radius-sm);">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
                <button class="btn-primary" id="saveModalBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PriorityFlow Task Dashboard. Designed with elegance.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
